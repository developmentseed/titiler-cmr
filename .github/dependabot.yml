version: 2
updates:
  - package-ecosystem: uv
    cooldown:
      default-days: 7
    directory: "/"
    schedule:
      interval: monthly
    groups:
      all:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: monthly
    groups:
      all:
        patterns:
          - "*"
    commit-message:
      prefix: "ci(deps):"
