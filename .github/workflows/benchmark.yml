name: Benchmark

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

env:
  UV_FROZEN: 'true'
  UV_NO_PROGRESS: 'true'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # zizmor: ignore[artipacked]
        # This workflow commits benchmark results via git push, so
        # persisted credentials are required for the push step.

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.*"
          enable-cache: false

      - name: Install dependencies
        run: |
          uv sync

      - name: Run benchmark
        run: |
          uv run pytest --benchmark-only --benchmark-json benchmark.json

      - name: Commit benchmark results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add benchmark.json
          git commit -m "Update benchmark results" || echo "No changes to commit"
          git push
