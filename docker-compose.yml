secrets:
  # To generate the secret files, run the following command:
  #
  #    uv run scripts/write-secrets.py
  #
  # See comments in the script describing how it obtains the values to write.
  #
  # Unfortunately, when specifying secrets via docker compose, we are currently
  # forced to use secret files rather than the more convenient environment
  # variable option due to a bug in how docker compose passes env-var-based
  # secret values to the docker build process.
  #
  # Although the following issues are closed, there still appears to be broken
  # behavior, and there are other related issues mentioned in various comments:
  #
  # - https://github.com/docker/compose/issues/13255
  # - https://github.com/docker/compose/issues/13235
  #
  earthdata-username:
    file: ./secrets/earthdata-username.txt
  earthdata-password:
    file: ./secrets/earthdata-password.txt

services:
  titiler-cmr:
    container_name: titiler-cmr
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - earthdata-username
        - earthdata-password
    ports:
      - "8081:8081"
    volumes:
      - ./titiler:/app/titiler
    environment:
      # Application
      - HOST=0.0.0.0
      - PORT=8081
      - WEB_CONCURRENCY=1
      - TITILER_CMR_DEBUG=TRUE
      - TITILER_CMR_EARTHDATA_USERNAME=${EARTHDATA_USERNAME}
      - TITILER_CMR_EARTHDATA_PASSWORD=${EARTHDATA_PASSWORD}
      # GDAL Config
      # This option controls the default GDAL raster block cache size.
      # If its value is small (less than 100000), it is assumed to be measured in megabytes, otherwise in bytes.
      - GDAL_CACHEMAX=200
      - GDAL_DISABLE_READDIR_ON_OPEN=EMPTY_DIR
      - GDAL_INGESTED_BYTES_AT_OPEN=32768
      - GDAL_HTTP_MERGE_CONSECUTIVE_RANGES=YES
      - GDAL_HTTP_COOKIEJAR=/tmp/cookies.txt
      - GDAL_HTTP_MULTIPLEX=YES
      - GDAL_HTTP_VERSION=2
      # The file can be cached in RAM by setting the configuration option VSI_CACHE to TRUE.
      # The cache size defaults to 25 MB, but can be modified by setting the configuration option VSI_CACHE_SIZE (in bytes).
      # Content in that cache is discarded when the file handle is closed.
      - VSI_CACHE=TRUE
      - VSI_CACHE_SIZE=536870912
      # In addition, a global least-recently-used cache of 16 MB shared among all downloaded content is enabled by default,
      # and content in it may be reused after a file handle has been closed and reopen,
      # during the life-time of the process or until VSICurlClearCache() is called.
      # Starting with GDAL 2.3, the size of this global LRU cache can be modified by
      # setting the configuration option CPL_VSIL_CURL_CACHE_SIZE (in bytes).
      - CPL_VSIL_CURL_CACHE_SIZE=200000000
      # TiTiler Config
      - MOSAIC_CONCURRENCY=5
      # AWS S3 endpoint config
      # - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      # - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    develop:
      watch:
        - action: rebuild
          path: ./pyproject.toml
