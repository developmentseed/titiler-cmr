<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Granule Vector Tiles — TiTiler-CMR</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #060810; color: #e2e8f0; height: 100vh; overflow: hidden; }
    #map { position: absolute; inset: 0; }

    /* ── Panel ── */
    #panel {
      position: absolute; top: 16px; left: 16px; z-index: 10;
      background: rgba(8, 10, 18, 0.93);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 12px; padding: 18px; width: 290px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .panel-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .panel-dot { width: 8px; height: 8px; border-radius: 50%; background: #38bdf8; box-shadow: 0 0 6px #38bdf8; }
    #panel h3 { font-size: 13px; font-weight: 700; color: #f1f5f9; letter-spacing: 0.3px; }
    #panel .subtitle { font-size: 10px; color: #475569; margin-bottom: 14px; line-height: 1.5; }

    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
    .field select, .field input {
      width: 100%; background: #0f1422; border: 1px solid #1e293b;
      color: #cbd5e1; border-radius: 6px; padding: 7px 10px; font-size: 12px;
      transition: border-color 0.2s;
    }
    .field select:focus, .field input:focus { outline: none; border-color: #38bdf8; }

    #load-btn {
      width: 100%; padding: 9px; margin-top: 4px;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      border: none; border-radius: 7px; color: #fff;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s; letter-spacing: 0.3px;
    }
    #load-btn:hover { opacity: 0.85; }
    #load-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Stats bar ── */
    .stats { display: flex; gap: 6px; margin-top: 12px; }
    .stat {
      flex: 1; background: #0f1422; border: 1px solid #1e293b;
      border-radius: 6px; padding: 7px 8px; text-align: center;
    }
    .stat-val { font-size: 16px; font-weight: 700; color: #38bdf8; }
    .stat-lbl { font-size: 9px; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

    #status { font-size: 10px; color: #64748b; margin-top: 10px; min-height: 14px; }

    /* ── Legend ── */
    .legend { margin-top: 12px; padding-top: 10px; border-top: 1px solid #1e293b; display: flex; align-items: center; gap: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #475569; }
    .swatch-fill { width: 14px; height: 10px; border-radius: 2px; background: rgba(56,189,248,0.2); border: 1.5px solid #38bdf8; }

    /* ── Zoom buttons ── */
    #zoom-btns {
      position: absolute; bottom: 32px; right: 16px; z-index: 10;
      display: flex; flex-direction: column; gap: 4px;
    }
    .zoom-btn {
      width: 36px; height: 36px; background: rgba(8,10,18,0.93);
      border: 1px solid rgba(56,189,248,0.2); border-radius: 8px;
      color: #94a3b8; font-size: 18px; font-weight: 300;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; backdrop-filter: blur(8px);
    }
    .zoom-btn:hover { color: #38bdf8; border-color: #38bdf8; }

    /* ── Popup ── */
    .maplibregl-popup-content {
      background: rgba(8,10,18,0.96) !important;
      border: 1px solid rgba(56,189,248,0.3) !important;
      border-radius: 8px !important; padding: 12px 14px !important;
      color: #cbd5e1 !important; font-size: 11px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6) !important;
    }
    .maplibregl-popup-tip { display: none !important; }
    .popup-id { font-size: 10px; color: #475569; margin-bottom: 6px; word-break: break-all; }
    .popup-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
    .popup-row span:first-child { color: #475569; }
    .popup-row span:last-child { color: #38bdf8; font-weight: 600; }
    .popup-link { display: block; margin-top: 8px; text-align: center; font-size: 10px; color: #0ea5e9; text-decoration: none; }
    .popup-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div id="map"></div>

<div id="panel">
  <div class="panel-header">
    <div class="panel-dot"></div>
    <h3>Granule Vector Tiles</h3>
  </div>
  <p class="subtitle">CMR granule footprints via MVT — only tiles in view are fetched from NASA CMR in real time.</p>

  <div class="field">
    <label>Dataset</label>
    <select id="sel-collection">
      <option value="C1990404790-POCLOUD" data-temporal="1992-01-16T18:00:00Z">ECCO Sea Ice Velocity</option>
      <option value="C1996881146-POCLOUD" data-temporal="2020-06-15T09:00:00Z">MUR SST (Global)</option>
    </select>
  </div>
  <div class="field">
    <label>Temporal</label>
    <input id="inp-temporal" type="text" value="1992-01-16T18:00:00Z" />
  </div>

  <button id="load-btn">Load Granules</button>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="stat-visible">—</div><div class="stat-lbl">Visible</div></div>
    <div class="stat"><div class="stat-val" id="stat-tiles">0</div><div class="stat-lbl">Tiles fetched</div></div>
    <div class="stat"><div class="stat-val" id="stat-zoom">2</div><div class="stat-lbl">Zoom</div></div>
  </div>

  <div id="status">Ready — select a dataset and click Load.</div>

  <div class="legend">
    <div class="legend-item"><div class="swatch-fill"></div> Granule footprint</div>
    <div class="legend-item" style="margin-left:auto; font-size:9px; color:#1e293b;">Click a granule for details</div>
  </div>
</div>

<div id="zoom-btns">
  <button class="zoom-btn" id="btn-zoom-in">+</button>
  <button class="zoom-btn" id="btn-zoom-out">−</button>
</div>

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
